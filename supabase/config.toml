# Ports 54331+ to avoid conflict with other Supabase projects on default 54321–54330
project_id = "camtok"

[api]
port = 54331
schemas = ["public"]

[db]
port = 54332

[studio]
port = 54333

[inbucket]
port = 54334

[analytics]
port = 54337

[auth]
# Production Site URL is used in confirmation email templates ({{ .SiteURL }}).
# Localhost + Vercel preview URLs are allowlisted via additional_redirect_urls.
site_url = "https://camtok-web.vercel.app"
additional_redirect_urls = [
  "https://camtok-web.vercel.app/**",
  "https://camtok-web.vercel.app/auth/callback",
  "https://*.vercel.app/**",
  "http://localhost:3000/**",
  "http://localhost:3000/auth/callback",
]

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

# Hosted + local: forces the verify link to use {{ .ConfirmationURL }} (includes
# redirect_to from signUp). Dashboard templates that only use {{ .SiteURL }} send
# users to whatever Site URL is set — never do that for confirmation.
[auth.email.template.confirmation]
subject = "Confirm your BetTok account"
content_path = "./supabase/templates/confirmation.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
