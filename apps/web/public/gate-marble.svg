<svg xmlns="http://www.w3.org/2000/svg" width="80" height="52" viewBox="0 0 80 52">
  <defs>
    <filter id="drop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
    <linearGradient id="pier" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ede8de"/>
      <stop offset="45%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#ddd6c8"/>
    </linearGradient>
    <linearGradient id="fascia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#e4ddd0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="40" cy="48" rx="34" ry="5" fill="rgba(0,0,0,0.22)"/>

  <!-- Left pier (main block) -->
  <rect x="1"  y="2" width="22" height="46" rx="3" fill="url(#pier)" stroke="#bfb9ac" stroke-width="1" filter="url(#drop)"/>
  <!-- Right pier -->
  <rect x="57" y="2" width="22" height="46" rx="3" fill="url(#pier)" stroke="#bfb9ac" stroke-width="1" filter="url(#drop)"/>

  <!-- Front entablature (faces approaching vehicle) -->
  <rect x="23" y="2" width="34" height="13" rx="1" fill="url(#fascia)" stroke="#bfb9ac" stroke-width="0.8"/>
  <!-- Back entablature -->
  <rect x="23" y="37" width="34" height="13" rx="1" fill="url(#fascia)" stroke="#bfb9ac" stroke-width="0.8"/>

  <!-- Passage opening  dark like looking down into the arch vault -->
  <rect x="23" y="15" width="34" height="22" rx="1.5" fill="#1a120b" fill-opacity="0.78"/>
  <!-- Arch intrados (the curved inner edge visible from above) -->
  <path d="M23,15 Q40,10 57,15" fill="none" stroke="#d4cfc4" stroke-width="1.8" opacity="0.65"/>
  <path d="M23,37 Q40,42 57,37" fill="none" stroke="#d4cfc4" stroke-width="1.8" opacity="0.65"/>

  <!-- Engaged columns on left pier (4 shallow pilasters) -->
  <rect x="4"  y="5" width="3.5" height="42" rx="1" fill="#e8e2d6" opacity="0.55"/>
  <rect x="10" y="5" width="3.5" height="42" rx="1" fill="#e8e2d6" opacity="0.55"/>
  <rect x="16" y="5" width="3.5" height="42" rx="1" fill="#e8e2d6" opacity="0.55"/>

  <!-- Engaged columns on right pier -->
  <rect x="60" y="5" width="3.5" height="42" rx="1" fill="#e8e2d6" opacity="0.55"/>
  <rect x="66" y="5" width="3.5" height="42" rx="1" fill="#e8e2d6" opacity="0.55"/>
  <rect x="72" y="5" width="3.5" height="42" rx="1" fill="#e8e2d6" opacity="0.55"/>

  <!-- Cornice lines -->
  <line x1="1"  y1="15" x2="79" y2="15" stroke="#a89f90" stroke-width="0.7" opacity="0.45"/>
  <line x1="1"  y1="37" x2="79" y2="37" stroke="#a89f90" stroke-width="0.7" opacity="0.45"/>

  <!-- Frieze detail strip on front entablature -->
  <rect x="25" y="7"  width="30" height="2" rx="0.5" fill="#d4cfc4" opacity="0.5"/>
  <!-- Frieze detail on back entablature -->
  <rect x="25" y="43" width="30" height="2" rx="0.5" fill="#d4cfc4" opacity="0.5"/>
</svg>
